</head>
<body>
    <div class="section section1">
        <header>
            <div class="buttons">
                <a href="PROFBURO_IMIT_NEWS.html" class="news">
                    <img src="/images/Group 5.png" alt="news">

                <a href="PROFBURO_IMIT_HOME.html" class="home">

                <a href="PROFBURO_IMIT_QUESTIONS.html" class="questions">

            </div>
            <div class="marks">
                <img src="/images/Marks.png" alt="marks" />

        </header>
        <div class="faq_container">
    <article class="faq_title">ЧАСТО ЗАДАВАЕМЫЕ ВОПРОСЫ</article>

    <div class="faq_item">
        <button class="faq_question">А как стать частью нашего профбюро?</button>
        <div class="faq_answer">
            <p>Пишите председателю в ВК @anastayseyshen или его заместитиелю (тоже в ВК) @id363799315</p>
        </div>
    </div>

    <div class="faq_item">
        <button class="faq_question">Есть ли у вас соцсети?</button>
        <div class="faq_answer">
            <p>Да, ВК (prof_imit) или телеграмм (https://t.me/profburo_imit)</p>
        </div>
    </div>

        </div>
            
</div>
</body>
<script>
    const faqItems = document.querySelectorAll('.faq_item');

    faqItems.forEach(item => {
        const question = item.querySelector('.faq_question');
        question.addEventListener('click', () => {
            faqItems.forEach(otherItem => {
                if (otherItem !== item) otherItem.classList.remove('active');
            });
            item.classList.toggle('active');
        });
    });
    


    window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        document.body.classList.add('loaded');
    }, 200); // Подождет 0.2 секунды перед проявлением
});
document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            // Проверяем, что ссылка не пустая и ведет на твой сайт
            const href = this.getAttribute('href');
            if (href && !href.startsWith('#') && this.hostname === window.location.hostname) {
                
                e.preventDefault(); // Останавливаем мгновенный переход
                const destination = this.href;

                // Добавляем класс затемнения
                document.body.classList.add('fade-out');

                // Ждем 500мс (время совпадает с transition в CSS) и переходим
                setTimeout(() => {
                    window.location.href = destination;
                }, 200);
            }
        });
    });
</script>
</html>
